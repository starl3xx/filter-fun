name: contracts CI

on:
  pull_request:
    paths:
      - 'packages/contracts/**'
      - '.github/workflows/contracts-ci.yml'
  push:
    branches: [main]

defaults:
  run:
    working-directory: packages/contracts

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      # Every dep is pinned. Floating any of these makes CI builds non-reproducible —
      # an upstream breaking change (V4 in particular ships them often) would fail CI on
      # PRs that have nothing to do with the change. Bump these intentionally, locally first.
      #
      # v4-core and v4-periphery don't release on tags we can pin — v4-core has only
      # `v4.0.0` (an old experimental tag), v4-periphery has none — so they're pinned to
      # the commit SHAs of their package.json `1.0.2` and `1.0.4` bump commits.
      - name: Install dependencies
        run: |
          forge install --no-git foundry-rs/forge-std@v1.16.0
          forge install --no-git OpenZeppelin/openzeppelin-contracts@v5.5.0
          forge install --no-git Vectorized/solady@v0.1.26
          forge install --no-git Uniswap/v4-core@59d3ecf53afa9264a16bba0e38f4c5d2231f80bc
          forge install --no-git Uniswap/v4-periphery@3231810e39b8c4d569b9d66907fa4ef8cd2cec22

      - name: Build
        run: forge build --sizes

      # `--threads 1` serializes test files. Several scripts (`DeploySepolia.s.sol`,
      # `SeedFilter.s.sol`, `VerifySepolia.s.sol`) read/write a shared manifest under
      # `deployments/` plus several `vm.setEnv`-controlled knobs; those are process-wide
      # state, so concurrent tests would race and silently produce wrong paths or stale
      # manifests.
      #
      # `--isolate` snapshots EVM state after `setUp()` and reverts to it before every
      # test. Required because `Deploy.t.sol` runs the actual deploy script in-process and
      # CREATE2-deploys `FilterHook` at a deterministic address; without isolation the
      # hook from a prior test persists, and the next `deployer.run()` reverts on the
      # CREATE2 collision before reaching the manifest-guard check.
      #
      # Both flags are also wired into `package.json`'s `test` script so `pnpm test` from
      # the contracts package matches CI; matching `foundry.toml` fields (`threads`,
      # `isolate`) are silently ignored by `forge test` in stable 1.5.1.
      #
      # Unit tests run first — they're fast and fail-fast on regressions. The invariant
      # suite below runs separately so its slower fuzz cycles don't block early failure
      # signals on a unit-test-level bug.
      - name: Unit tests
        run: forge test --no-match-test "^invariant_" -vv --isolate --threads 1

      # Property-based invariant suite per spec §42.2 (audit-prep). The 8 settlement +
      # 10 tournament invariants are the contractual guarantees the protocol must hold
      # under any sequence of valid operations. Failure here MUST block merge — the
      # required-status-check rule on `main` should include this step's job-name.
      #
      # Runs with the default `[invariant]` profile (256 runs × 500 depth, see
      # `foundry.toml`). Local pre-audit sweeps can use `forge test --profile deep` for
      # 1024 runs.
      - name: Invariant tests (spec §42.2)
        run: forge test --match-test "^invariant_" -vv --isolate --threads 1

      - name: Format check
        run: forge fmt --check
