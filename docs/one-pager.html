  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  // Browsers emit a sanitized "Script error." (no filename / lineno / error
  // object) for any script that loaded cross-origin without CORS — Google
  // Fonts CSS fetched by font-face URLs, embedded blob: scripts, etc. These
  // carry no actionable info, so swallow them silently rather than showing
  // the red overlay; only surface errors that have at least a filename.
  window.addEventListener('error', function(e) {
    if (!e.filename && (!e.message || e.message === 'Script error.')) return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

*/\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9a189c27-30c6-42fc-bc15-17d1ce93e00d\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"b8ba8032-f137-42c0-aa0a-07cea5ced55d\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c75d8f77-6b9d-4012-ba85-6d679f486ccc\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a44a4922-47f0-46f7-80f5-ab3d5120586d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"fc287aaf-bd89-4bef-8f89-07ed25ed5b5c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* ── Brand tokens (from locked v1.0 kit) ─────────────────────── */\n  :root {\n    --bg:          #0a0612;\n    --bg2:         #140828;\n    --panel:       #15091f;\n    --panel-deep:  #1c0c2c;\n    --line:        rgba(255,255,255,0.08);\n    --line-2:      rgba(255,255,255,0.14);\n    --ink:         #fef2ff;\n    --ink-mute:    rgba(255,235,255,0.62);\n    --ink-faint:   rgba(255,235,255,0.38);\n\n    --pink:        #ff3aa1;\n    --red:         #ff2d55;\n    --yellow:      #ffe933;\n    --green:       #52ff8b;\n    --cyan:        #00f0ff;\n    --purple:      #9c5cff;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin:0; padding:0; }\n  body {\n    font-family: 'Bricolage Grotesque', system-ui, sans-serif;\n    background:\n      radial-gradient(ellipse 70% 50% at 20% 0%, rgba(255,58,161,0.10), transparent 55%),\n      radial-gradient(ellipse 60% 40% at 90% 30%, rgba(156,92,255,0.08), transparent 55%),\n      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 40%, var(--bg) 100%);\n    color: var(--ink);\n    font-size: 15px;\n    line-height: 1.55;\n    letter-spacing: -0.005em;\n    min-height: 100vh;\n    background-attachment: fixed;\n  }\n\n  .page {\n    max-width: 880px;\n    margin: 0 auto;\n    padding: 56px 56px 80px;\n    position: relative;\n  }\n\n  /* Subtle grid backdrop */\n  .page::before {\n    content:''; position: fixed; inset: 0; pointer-events: none; z-index: -1;\n    background-image:\n      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);\n    background-size: 64px 64px;\n    mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 0%, transparent 80%);\n  }\n\n  /* ── Header / Hero ───────────────────────────────────────────── */\n  .hero {\n    display: flex; align-items: flex-start; justify-content: space-between;\n    gap: 24px; margin-bottom: 36px;\n  }\n  .wm {\n    display: flex; align-items: baseline; gap: 0; line-height: 1;\n    font-weight: 900; letter-spacing: -0.04em; font-size: 56px;\n  }\n  .wm .filter, .wm .fun { color: var(--ink); }\n  .wm .tri-wrap { display: inline-flex; align-items: center; margin: 0 4px; }\n  .wm .tri {\n    width: 32px; height: 32px;\n    transform: translateY(6px);\n    filter: drop-shadow(0 0 14px rgba(255,58,161,0.6))\n            drop-shadow(0 0 4px rgba(255,58,161,0.9));\n  }\n\n  .hero-meta {\n    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;\n    font-family: 'JetBrains Mono', monospace; font-size: 11px;\n    color: var(--ink-faint); letter-spacing: 0.18em; text-transform: uppercase;\n  }\n  .hero-meta .v { color: var(--pink); font-weight: 700; }\n\n  .tagline {\n    font-size: 38px; font-weight: 800; letter-spacing: -0.028em;\n    margin: 0 0 14px; color: var(--ink);\n    display: flex; align-items: center; gap: 14px; line-height: 1.06;\n    max-width: 880px;\n  }\n  .tagline .glyph {\n    display: inline-block; width: 30px; height: 30px;\n    transform: translateY(4px);\n    filter: drop-shadow(0 0 14px rgba(255,58,161,0.55))\n            drop-shadow(0 0 4px rgba(255,58,161,0.85));\n  }\n  .lede {\n    font-size: 19px; line-height: 1.55; color: var(--ink-mute);\n    margin: 0 0 48px; max-width: 720px; font-weight: 500;\n    letter-spacing: -0.012em;\n  }\n  @media (max-width: 760px) {\n    .tagline { font-size: 28px; gap: 10px; }\n    .tagline .glyph { width: 22px; height: 22px; }\n    .lede { font-size: 17px; margin-bottom: 32px; }\n  }\n  .lede strong { color: var(--ink); font-weight: 700; }\n  .lede .em-pink { color: var(--pink); font-weight: 700; }\n\n  /* ── Section heads ───────────────────────────────────────────── */\n  .section { margin: 56px 0 0; }\n  .section + .section { margin-top: 64px; }\n\n  .eyebrow {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    color: var(--pink); letter-spacing: 0.24em; text-transform: uppercase;\n    font-weight: 800; margin: 0 0 8px;\n    display: flex; align-items: center; gap: 10px;\n  }\n  .eyebrow::before {\n    content:''; display: inline-block; width: 24px; height: 1px;\n    background: var(--pink); transform: translateY(-1px);\n  }\n  h2 {\n    font-size: 30px; font-weight: 800; letter-spacing: -0.025em;\n    margin: 0 0 20px; line-height: 1.15;\n  }\n  h3 {\n    font-size: 17px; font-weight: 800; letter-spacing: -0.012em;\n    margin: 0 0 8px;\n  }\n\n  p { margin: 0 0 14px; color: var(--ink-mute); }\n  p strong { color: var(--ink); font-weight: 700; }\n  p .em-pink { color: var(--pink); font-weight: 700; }\n\n  /* ── The pitch panel ─────────────────────────────────────────── */\n  .pitch {\n    border: 1px solid var(--line-2); border-radius: 16px;\n    background: linear-gradient(180deg, rgba(255,58,161,0.06), rgba(255,255,255,0.01));\n    padding: 28px 28px 22px;\n    position: relative; overflow: hidden;\n  }\n  .pitch::before {\n    content:''; position: absolute; top: 0; left: 0; right: 0; height: 2px;\n    background: linear-gradient(90deg, var(--pink), var(--red), var(--purple));\n  }\n  .pitch p { font-size: 16px; line-height: 1.55; }\n  .pitch p:last-child { margin-bottom: 0; }\n  .pitch .punch {\n    font-size: 18px; font-weight: 700; color: var(--ink);\n    letter-spacing: -0.012em; margin-top: 16px;\n  }\n\n  /* ── Steps grid ──────────────────────────────────────────────── */\n  .steps {\n    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;\n    margin-top: 4px;\n  }\n  .step {\n    border: 1px solid var(--line-2); border-radius: 12px;\n    padding: 14px 14px 16px; background: rgba(255,255,255,0.015);\n    position: relative;\n  }\n  .step .num {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    color: var(--pink); letter-spacing: 0.18em; font-weight: 800;\n    margin-bottom: 6px;\n  }\n  .step .title {\n    font-size: 15px; font-weight: 800; letter-spacing: -0.012em;\n    margin-bottom: 4px; color: var(--ink);\n  }\n  .step .when {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    color: var(--ink-faint); letter-spacing: 0.08em; margin-bottom: 8px;\n  }\n  .step .body {\n    font-size: 12px; line-height: 1.45; color: var(--ink-mute);\n    letter-spacing: -0.005em;\n  }\n  .step.filter { border-color: rgba(255,45,85,0.45); background: rgba(255,45,85,0.06); }\n  .step.filter .title { color: var(--red); }\n  .step.filter .num { color: var(--red); }\n  .step.winner { border-color: rgba(255,233,51,0.45); background: rgba(255,233,51,0.05); }\n  .step.winner .title { color: var(--yellow); }\n  .step.winner .num { color: var(--yellow); }\n\n  .splits {\n    margin-top: 20px; padding: 18px 20px;\n    border: 1px dashed var(--line-2); border-radius: 12px;\n    font-size: 13px; color: var(--ink-mute); line-height: 1.6;\n  }\n  .splits strong { color: var(--ink); font-weight: 700; }\n  .splits .pink { color: var(--pink); font-weight: 700; }\n\n  /* ── Comparison table ────────────────────────────────────────── */\n  .compare {\n    border: 1px solid var(--line-2); border-radius: 14px;\n    overflow: hidden; background: rgba(255,255,255,0.012);\n  }\n  .compare-row {\n    display: grid; grid-template-columns: 1fr 1fr;\n    border-bottom: 1px solid var(--line);\n  }\n  .compare-row:last-child { border-bottom: 0; }\n  .compare-row.head {\n    background: rgba(255,255,255,0.04);\n  }\n  .compare-row.head .cell {\n    font-family: 'JetBrains Mono', monospace; font-size: 11px;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    font-weight: 800; padding: 13px 18px; color: var(--ink-faint);\n  }\n  .compare-row.head .ours { color: var(--pink); }\n  .cell {\n    padding: 14px 18px; font-size: 13.5px; line-height: 1.5;\n    color: var(--ink-mute); letter-spacing: -0.005em;\n  }\n  .cell.others {\n    border-right: 1px solid var(--line);\n    color: var(--ink-faint);\n  }\n  .cell.ours {\n    background: linear-gradient(90deg, rgba(255,58,161,0.06), transparent);\n    color: var(--ink);\n  }\n  .cell strong { color: var(--ink); font-weight: 700; }\n\n  /* ── Status table ────────────────────────────────────────────── */\n  .status-tbl {\n    border: 1px solid var(--line-2); border-radius: 14px;\n    overflow: hidden; background: rgba(255,255,255,0.012);\n  }\n  .status-row {\n    display: grid; grid-template-columns: 240px 1fr;\n    border-bottom: 1px solid var(--line);\n  }\n  .status-row:last-child { border-bottom: 0; }\n  .status-row.head { background: rgba(255,255,255,0.04); }\n  .status-row.head .cell {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    letter-spacing: 0.22em; text-transform: uppercase;\n    font-weight: 800; color: var(--ink-faint); padding: 12px 18px;\n  }\n  .status-row .label {\n    padding: 14px 18px; font-size: 14px; font-weight: 700;\n    color: var(--ink); letter-spacing: -0.008em;\n    border-right: 1px solid var(--line);\n    display: flex; align-items: center; gap: 10px;\n  }\n  .status-row .state {\n    padding: 14px 18px; font-size: 13px; line-height: 1.5;\n    color: var(--ink-mute); letter-spacing: -0.003em;\n  }\n  .pill {\n    display: inline-block; padding: 3px 8px; border-radius: 5px;\n    font-family: 'JetBrains Mono', monospace; font-size: 9px;\n    letter-spacing: 0.16em; font-weight: 800; text-transform: uppercase;\n    vertical-align: middle;\n  }\n  .pill.live    { background: rgba(82,255,139,0.14); color: var(--green); }\n  .pill.locked  { background: rgba(255,233,51,0.14); color: var(--yellow); }\n  .pill.progress{ background: rgba(255,58,161,0.14); color: var(--pink); }\n  .pill.gated   { background: rgba(255,255,255,0.06); color: var(--ink-mute); }\n  .pill.pending { background: rgba(156,92,255,0.16); color: var(--purple); }\n\n  /* ── Asks list ───────────────────────────────────────────────── */\n  .asks { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n  .ask {\n    border: 1px solid var(--line-2); border-radius: 12px;\n    padding: 18px 20px; background: rgba(255,255,255,0.015);\n    position: relative;\n  }\n  .ask .who {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    color: var(--pink); letter-spacing: 0.20em; font-weight: 800;\n    text-transform: uppercase; margin-bottom: 6px;\n  }\n  .ask .what {\n    font-size: 15px; font-weight: 800; letter-spacing: -0.012em;\n    margin-bottom: 6px; color: var(--ink);\n  }\n  .ask .desc {\n    font-size: 12.5px; line-height: 1.5; color: var(--ink-mute);\n    letter-spacing: -0.003em;\n  }\n\n  /* ── Quick links / footer ────────────────────────────────────── */\n  .footer {\n    margin-top: 64px; padding-top: 28px;\n    border-top: 1px solid var(--line-2);\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 24px; flex-wrap: wrap;\n  }\n  .links { display: flex; flex-wrap: wrap; gap: 6px 18px; font-size: 13px; }\n  .links a {\n    color: var(--ink-mute); text-decoration: none;\n    border-bottom: 1px solid var(--line-2);\n    padding-bottom: 1px; transition: color 0.15s, border-color 0.15s;\n  }\n  .links a:hover { color: var(--pink); border-color: var(--pink); }\n  .links .key {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    color: var(--ink-faint); letter-spacing: 0.18em;\n    margin-right: 4px; text-transform: uppercase;\n  }\n\n  .closer {\n    font-family: 'Bricolage Grotesque', sans-serif;\n    font-size: 14px; font-weight: 700; letter-spacing: -0.012em;\n    display: flex; align-items: center; gap: 8px;\n    color: var(--ink-mute);\n  }\n  .closer .em { color: var(--ink); font-weight: 800; }\n  .closer .glyph {\n    display: inline-block; width: 14px; height: 14px;\n    transform: translateY(1px);\n  }\n\n  /* ── Print ───────────────────────────────────────────────────── */\n  @media print {\n    body { background: white; color: black; }\n    .page { padding: 32px 36px; max-width: none; }\n    .page::before { display: none; }\n    .hero, .pitch, .compare, .status-tbl, .ask, .step, .splits {\n      page-break-inside: avoid;\n    }\n    .section { margin-top: 28px; }\n    .section + .section { margin-top: 28px; }\n    .footer { page-break-inside: avoid; }\n  }\n\n  @media (max-width: 760px) {\n    .page { padding: 32px 24px 60px; }\n    .hero { flex-direction: column; align-items: flex-start; }\n    .hero-meta { align-items: flex-start; }\n    .wm { font-size: 42px; }\n    .wm .tri { width: 24px; height: 24px; }\n    .steps { grid-template-columns: 1fr 1fr; }\n    .compare-row { grid-template-columns: 1fr; }\n    .cell.others { border-right: 0; border-bottom: 1px solid var(--line); }\n    .status-row { grid-template-columns: 1fr; }\n    .status-row .label { border-right: 0; border-bottom: 1px solid var(--line); }\n    .asks { grid-template-columns: 1fr; }\n  }\n\n  /* ── Who benefits (split-audience) ───────────────────────────── */\n  .who-grid {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\n  }\n  .who-card {\n    position: relative; overflow: hidden;\n    border: 1px solid var(--line-2); border-radius: 16px;\n    padding: 26px 26px 22px;\n    display: flex; flex-direction: column;\n  }\n  .who-card::before {\n    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;\n  }\n  .who-card--launcher::before { background: linear-gradient(90deg, var(--pink), var(--red)); }\n  .who-card--holder::before   { background: linear-gradient(90deg, var(--cyan), var(--purple)); }\n  .who-card--launcher {\n    background: linear-gradient(180deg, rgba(255,58,161,0.06), rgba(255,255,255,0.008));\n  }\n  .who-card--holder {\n    background: linear-gradient(180deg, rgba(0,240,255,0.05), rgba(255,255,255,0.008));\n  }\n  .who-head { margin-bottom: 14px; }\n  .who-tag {\n    font-family: 'JetBrains Mono', monospace; font-size: 10px;\n    letter-spacing: 0.22em; text-transform: uppercase; font-weight: 800;\n    margin-bottom: 8px;\n  }\n  .who-card--launcher .who-tag { color: var(--pink); }\n  .who-card--holder   .who-tag { color: var(--cyan); }\n  .who-title {\n    font-size: 19px; font-weight: 800; letter-spacing: -0.018em;\n    margin: 0; color: var(--ink); line-height: 1.2;\n  }\n  .who-list {\n    list-style: none; padding: 0; margin: 0 0 18px;\n    display: flex; flex-direction: column; gap: 8px;\n    font-size: 13.5px; line-height: 1.5; color: var(--ink-mute);\n    letter-spacing: -0.005em;\n  }\n  .who-list li { position: relative; padding-left: 16px; }\n  .who-list li::before {\n    content: '—'; position: absolute; left: 0; font-weight: 800;\n  }\n  .who-card--launcher .who-list li::before { color: var(--pink); }\n  .who-card--holder   .who-list li::before { color: var(--cyan); }\n  .who-list li strong { color: var(--ink); font-weight: 700; }\n  .who-vs {\n    margin-top: auto; padding-top: 14px;\n    border-top: 1px dashed var(--line-2);\n    display: flex; flex-direction: column; gap: 4px;\n  }\n  .who-vs-label {\n    font-family: 'JetBrains Mono', monospace; font-size: 9px;\n    letter-spacing: 0.22em; text-transform: uppercase; font-weight: 800;\n    color: var(--ink-faint);\n  }\n  .who-vs-line {\n    font-size: 12px; color: var(--ink-mute);\n    text-decoration: line-through; text-decoration-color: var(--red);\n    text-decoration-thickness: 1px;\n    letter-spacing: -0.003em;\n  }\n\n  /* ── Mechanism arrow chain ───────────────────────────────────── */\n  .mechanism-chain {\n    display: flex; flex-wrap: wrap; align-items: center;\n    gap: 8px 10px; margin: 6px 0 14px;\n  }\n  .mechanism-step {\n    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;\n    letter-spacing: 0.10em; font-weight: 800; text-transform: uppercase;\n    padding: 8px 14px;\n    border: 1px solid rgba(255,45,85,0.35);\n    border-radius: 99px;\n    background: rgba(255,45,85,0.08);\n    color: var(--red);\n  }\n  .mechanism-arrow {\n    font-family: 'JetBrains Mono', monospace; font-size: 18px;\n    font-weight: 800; color: var(--pink); line-height: 1;\n  }\n  .mechanism-punch {\n    font-size: 18px; font-weight: 700; color: var(--ink);\n    letter-spacing: -0.012em; margin: 6px 0 0;\n  }\n\n  /* ── Closing identity (bigger end-stamp) ─────────────────────── */\n  .closing-identity { margin-top: 80px; }\n  .closing-grid {\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 24px;\n  }\n  .closing-text { display: flex; flex-direction: column; }\n  .closing-line {\n    font-size: 44px; font-weight: 900; letter-spacing: -0.035em;\n    margin: 0; line-height: 1.05;\n  }\n  .closing-line--pink {\n    color: var(--pink);\n    text-shadow: 0 0 18px rgba(255,58,161,0.35);\n  }\n  .closing-tri {\n    width: 56px; height: 56px; flex-shrink: 0;\n    filter: drop-shadow(0 0 20px rgba(255,58,161,0.55))\n            drop-shadow(0 0 6px rgba(255,58,161,0.9));\n  }\n\n  @media (max-width: 760px) {\n    .who-grid { grid-template-columns: 1fr; }\n    .closing-line { font-size: 30px; }\n    .closing-tri { width: 36px; height: 36px; }\n  }\n\n  /* ── Hero ghost ▼ atmosphere + load orchestration ─────────────\n     One bold visual moment on first paint: a giant low-opacity ▼ behind\n     the wordmark anchors the brand mark in negative space, and a single\n     orchestrated stagger (~0.9s total) reveals wordmark → tagline → lede\n     → glyph in cinematic order. The triangle \"drops\" rather than fading\n     — the word filter literally falls into place. After this one moment\n     the page is static; no scattered micro-interactions to fight the\n     reader's attention.\n\n     Implementation: a position:absolute SVG sits behind .page content in\n     the hero region with -z; CSS keyframes drive the stagger via\n     animation-delay. prefers-reduced-motion kills both the stagger and\n     the ghost-rotation, leaving the static composition intact. */\n  .page { position: relative; }\n  .hero-ghost {\n    position: absolute;\n    top: -40px; right: -120px;\n    width: 540px; height: 540px;\n    opacity: 0.045;\n    pointer-events: none;\n    z-index: 0;\n    transform: rotate(-8deg);\n    filter: drop-shadow(0 0 80px rgba(255,58,161,0.5));\n    animation: hero-ghost-breathe 9s ease-in-out infinite;\n  }\n  @keyframes hero-ghost-breathe {\n    0%, 100% { opacity: 0.04;  transform: rotate(-8deg) scale(1); }\n    50%      { opacity: 0.075; transform: rotate(-8deg) scale(1.04); }\n  }\n  .hero, .tagline, .lede { position: relative; z-index: 1; }\n\n  .hero, .tagline, .lede {\n    animation: hero-rise 0.7s cubic-bezier(0.16, 0.84, 0.32, 1) both;\n  }\n  .hero    { animation-delay: 0.05s; }\n  .tagline { animation-delay: 0.22s; }\n  .lede    { animation-delay: 0.42s; }\n  .tagline .glyph {\n    animation: hero-tri-drop 0.55s cubic-bezier(0.36, 1.4, 0.5, 1) 0.7s both;\n  }\n  @keyframes hero-rise {\n    from { opacity: 0; transform: translateY(10px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes hero-tri-drop {\n    0%   { opacity: 0; transform: translateY(-22px) scale(0.6) rotate(-4deg); }\n    65%  { opacity: 1; transform: translateY(3px) scale(1.06) rotate(0); }\n    100% { opacity: 1; transform: translateY(4px) scale(1) rotate(0); }\n  }\n\n  /* Card hover lift — single restrained micro-interaction; surfaces only\n     on user intent (hover), so non-interactive readers see nothing. */\n  .who-card {\n    transition: transform 0.22s cubic-bezier(0.2, 0.8, 0.3, 1),\n                border-color 0.22s ease;\n  }\n  .who-card:hover { transform: translateY(-2px); }\n  .who-card--launcher:hover { border-color: rgba(255,58,161,0.4); }\n  .who-card--holder:hover   { border-color: rgba(0,240,255,0.4); }\n\n  @media (prefers-reduced-motion: reduce) {\n    .hero-ghost,\n    .hero, .tagline, .lede, .tagline .glyph,\n    .who-card { animation: none !important; transition: none !important; }\n    .hero-ghost { opacity: 0.05; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- Reusable brand triangle (gradient + glow) -->\n<svg width=\"0\" height=\"0\" style=\"position:absolute\" aria-hidden=\"true\">\n  <defs>\n    <linearGradient id=\"tri-grad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n      <stop offset=\"0\" stop-color=\"#ff5fb8\"><\u002Fstop>\n      <stop offset=\"1\" stop-color=\"#ff2d55\"><\u002Fstop>\n    <\u002FlinearGradient>\n    <symbol id=\"tri\" viewBox=\"0 0 100 100\">\n      <polygon points=\"6,14 94,14 50,92\" fill=\"url(#tri-grad)\"><\u002Fpolygon>\n    <\u002Fsymbol>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<div class=\"page\">\n\n  <!-- Hero atmosphere: a giant low-opacity gradient triangle anchored\n       to the top-right negative space. Sits behind the wordmark via\n       z-index; the slow breathe keyframe gives it presence without\n       fighting the copy. -->\n  <svg class=\"hero-ghost\" viewBox=\"0 0 100 100\" aria-hidden=\"true\">\n    <use href=\"#tri\"><\u002Fuse>\n  <\u002Fsvg>\n\n  <!-- HERO -->\n  <header class=\"hero\">\n    <div class=\"wm\" aria-label=\"filter.fun\">\n      <span class=\"filter\">filter<\u002Fspan>\n      <span class=\"tri-wrap\"><svg class=\"tri\"><use href=\"#tri\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n      <span class=\"fun\">fun<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"hero-meta\">\n      <div>One-pager · v1.1<\u002Fdiv>\n      <div class=\"v\">May 2026 · Pre-mainnet<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <h1 class=\"tagline\">\n    12 tokens enter. Most get filtered. One gets funded.\n    <svg class=\"glyph\"><use href=\"#tri\"><\u002Fuse><\u002Fsvg>\n  <\u002Fh1>\n  <p class=\"lede\">\n    <strong>Every trade builds the pool.<\u002Fstrong>\n    <span class=\"em-pink\">Every loser feeds the winner.<\u002Fspan>\n    <strong>Survive the filter.<\u002Fstrong>\n  <\u002Fp>\n\n  <!-- TENSION -->\n  <section class=\"section\">\n    <div class=\"eyebrow\">The reality<\u002Fdiv>\n    <h2>Most tokens die here.<\u002Fh2>\n    <div class=\"pitch\">\n      <p class=\"punch\">You are competing for survival. <span class=\"em-pink\">▼<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LOOP -->\n  <section class=\"section\">\n    <div class=\"eyebrow\">The loop · Each week is a season<\u002Fdiv>\n    <h2>How it works<\u002Fh2>\n\n    <div class=\"steps\">\n      <div class=\"step\">\n        <div class=\"num\">01 / TRADE<\u002Fdiv>\n        <div class=\"title\">Launch &amp; trade<\u002Fdiv>\n        <div class=\"body\">\n          Tokens compete all week. <strong style=\"color:var(--ink)\">Every trade builds the pool.<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step filter\">\n        <div class=\"num\">02 / FILTER<\u002Fdiv>\n        <div class=\"title\">Get filtered <svg style=\"width:12px;height:12px;display:inline-block;transform:translateY(1px);margin-left:2px\"><use href=\"#tri\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"body\">\n          Weak tokens are eliminated. <strong style=\"color:var(--red)\">Their liquidity is removed.<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"num\">03 / POOL<\u002Fdiv>\n        <div class=\"title\">The pool grows<\u002Fdiv>\n        <div class=\"body\">\n          Every failure increases the reward.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"num\">04 / SURVIVOR<\u002Fdiv>\n        <div class=\"title\">One winner remains<\u002Fdiv>\n        <div class=\"body\">\n          Filtered users are <strong style=\"color:var(--ink)\">rolled into the winner<\u002Fstrong>.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step winner\">\n        <div class=\"num\">05 / WINNER<\u002Fdiv>\n        <div class=\"title\">Get funded<\u002Fdiv>\n        <div class=\"body\">\n          The winner absorbs everything.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHO BENEFITS -->\n  <section class=\"section\">\n    <div class=\"eyebrow\">Who benefits · Launchers + holders<\u002Fdiv>\n    <h2>What's in it for you.<\u002Fh2>\n\n    <div class=\"who-grid\">\n      <article class=\"who-card who-card--launcher\">\n        <header class=\"who-head\">\n          <div class=\"who-tag\">If you're a launcher<\u002Fdiv>\n          <h3 class=\"who-title\">A real arena. Not a graveyard.<\u002Fh3>\n        <\u002Fheader>\n        <ul class=\"who-list\">\n          <li><strong>Level playing field.<\u002Fstrong> HP scoring rewards real demand &mdash; not whales.<\u002Fli>\n          <li><strong>Built-in attention.<\u002Fstrong> The tournament arc carries every launch through the week.<\u002Fli>\n          <li><strong>Win &rarr; deep liquidity.<\u002Fstrong> 45% of the pool buys into the winner's LP &mdash; the Filter Fund Liquidity Reserve.<\u002Fli>\n          <li><strong>Lose &rarr; your holders aren't abandoned.<\u002Fstrong> They roll into the winner.<\u002Fli>\n          <li><strong>Provable commitment.<\u002Fstrong> Opt-in bag-lock makes \"I won't dump\" verifiable on-chain.<\u002Fli>\n        <\u002Ful>\n        <div class=\"who-vs\">\n          <span class=\"who-vs-label\">vs. other launchpads<\u002Fspan>\n          <span class=\"who-vs-line\">ship a coin &middot; one shot &middot; cap the chart &middot; hope<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"who-card who-card--holder\">\n        <header class=\"who-head\">\n          <div class=\"who-tag\">If you're a holder<\u002Fdiv>\n          <h3 class=\"who-title\">Losing isn't terminal.<\u002Fh3>\n        <\u002Fheader>\n        <ul class=\"who-list\">\n          <li><strong>Rollover.<\u002Fstrong> Filtered? Your position auto-rolls into the winner &mdash; pro rata.<\u002Fli>\n          <li><strong>Hold bonus.<\u002Fstrong> 14-day hold on the winner unlocks an extra share of the bounty.<\u002Fli>\n          <li><strong>Anti-rug by design.<\u002Fstrong> Bag-lock blocks creator dumps on the tokens you back.<\u002Fli>\n          <li><strong>Compounding upside.<\u002Fstrong> The Filter Fund Liquidity Reserve means past winners' liquidity sits behind every future one.<\u002Fli>\n          <li><strong>Sybil-resistant scoring.<\u002Fstrong> HP weights distinct buyers + retention &mdash; your trades count.<\u002Fli>\n        <\u002Ful>\n        <div class=\"who-vs\">\n          <span class=\"who-vs-label\">vs. other launchpads<\u002Fspan>\n          <span class=\"who-vs-line\">token dies &middot; your bag dies &middot; you eat the loss alone<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ROLLOVER -->\n  <section class=\"section\">\n    <div class=\"eyebrow\">Rollover · No terminal loss<\u002Fdiv>\n    <h2>Losing doesn't end your game.<\u002Fh2>\n    <div class=\"pitch\">\n      <p>If your token gets filtered: <strong>your position rolls into the winner<\u002Fstrong>. Hold it &rarr; <strong>earn a bonus<\u002Fstrong>.<\u002Fp>\n      <p class=\"punch\">You're always in the system. <span class=\"em-pink\">▼<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MECHANISM -->\n  <section class=\"section\">\n    <div class=\"eyebrow\">Mechanism · How losers die<\u002Fdiv>\n    <h2>Filtering doesn't just remove tokens. It removes their liquidity.<\u002Fh2>\n    <div class=\"mechanism-chain\">\n      <span class=\"mechanism-step\">Less liquidity<\u002Fspan>\n      <span class=\"mechanism-arrow\">&rarr;<\u002Fspan>\n      <span class=\"mechanism-step\">More slippage<\u002Fspan>\n      <span class=\"mechanism-arrow\">&rarr;<\u002Fspan>\n      <span class=\"mechanism-step\">Harder exits<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"mechanism-punch\">That's how losers die.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- WHY THIS WORKS -->\n  <section class=\"section\">\n    <div class=\"eyebrow\">Why this works<\u002Fdiv>\n    <h2>Capital concentrates. The strongest token wins.<\u002Fh2>\n    <div class=\"splits\" style=\"line-height:1.8\">\n      &mdash; liquidity is removed from losers<br>\n      &mdash; slippage increases<br>\n      &mdash; exits become expensive<br>\n      &mdash; capital rotates into stronger tokens<br>\n      &mdash; capital concentrates<br>\n      &mdash; <strong>the strongest token wins<\u002Fstrong>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WINNER -->\n  <section class=\"section\">\n    <div class=
