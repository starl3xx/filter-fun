[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
fs_permissions = [
    { access = "read", path = "./" },
    { access = "read-write", path = "./deployments" },
]
# NOTE on these two fields: forge stable 1.5.1 silently ignores them in `[profile.default]`
# for `forge test` invocations. They're kept here for documentation + future-compat; the
# *actual* enforcement is via the matching `--isolate --threads 1` flags in
# `package.json`'s `test` script and the `contracts-ci.yml` workflow. If a future forge
# version starts respecting them, the CLI flags become redundant rather than wrong.
#
# `isolate = true` — `Deploy.t.sol` runs `DeploySepolia` in-process; each `deployer.run()`
# CREATE2-deploys `FilterHook` at a deterministic address. Without isolation the hook from
# a prior test persists and the next deploy reverts on the CREATE2 collision before
# reaching the manifest-guard check.
#
# `threads = 1` — `Deploy.t.sol` uses `vm.setEnv` + `vm.writeJson` against the on-disk
# manifest. With concurrent test files, forge's cheatcode state (env vars, JSON writers)
# races nondeterministically and produces "manifest exists" / "vm.writeJson: failed to
# open file" flakes.
isolate = true
threads = 1

# Invariant testing config (spec §42.2). Applies to every `invariant_*` test.
#
# `runs` — number of randomized action sequences. 256 is the Foundry default and the
#   minimum bar for the audit-prep checklist. The deep profile below bumps to 1024 for
#   pre-audit local sweeps; CI sticks to 256 to keep the per-PR contracts job under the
#   ~5-min budget (full suite currently runs in ~2 min wall-clock on default).
# `depth` — calls per sequence. 500 is enough to walk a full season's lifecycle (filter
#   events → submitWinner → claims) plus a margin of adversary attempts.
# `fail_on_revert` — false because the handlers use try/catch on every adversary action;
#   "revert" here means a guard fired correctly, not a test failure. The ghost-flag pattern
#   carries the actual pass/fail signal into the `invariant_*` assertions.
# `call_override` — false; we don't need to swap implementations mid-sequence.
# `dictionary_weight` — 80 (default) keeps the fuzzer's input dictionary biased toward
#   addresses + selectors already mentioned in the test; productive for our bounded actor set.
[invariant]
runs = 256
depth = 500
fail_on_revert = false
call_override = false
dictionary_weight = 80

# `forge test --profile deep` runs 4× more sequences for the same cohort, useful for
# local pre-audit sweeps. Keep CI on the default profile. Foundry profiles inherit from
# `[profile.default]`, so we only override the invariant runs/depth here — `solc_version`,
# `optimizer`, `via_ir`, `evm_version`, `fs_permissions`, `isolate`, `threads` etc. all
# carry through unchanged. Re-stating them would bake in a drift hazard (default bumps
# would not propagate).
[profile.deep.invariant]
runs = 1024
depth = 500
fail_on_revert = false

[lint]
exclude_lints = ["unsafe-typecast"]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
